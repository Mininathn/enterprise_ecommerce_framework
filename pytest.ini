[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short

markers =
    smoke: Critical smoke tests
    regression: Full regression tests
    database: Database validation tests
    oracle: Oracle database tests
    mysql: MySQL database tests
    transformation: ETL transformation tests
    source_target: Source-to-target validation tests
    data_quality: Data-quality validation tests
    api: REST API automation tests